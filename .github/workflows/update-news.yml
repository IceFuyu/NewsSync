name: Update News

# Kein Cron: der Feed wird nur manuell aktualisiert.
# Actions -> Update News -> "Run workflow"
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Generate news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-news.js

      - name: Commit updated data
        run: |
          git config user.name "signal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json archive.json weekly-review.json
          git diff --cached --quiet || git commit -m "Update news data"
          git push
